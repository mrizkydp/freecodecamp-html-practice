<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with the HTML Audio Element</title>
</head>
<body>
    <h1>freeCodeCamp Tunes</h1>

    <h2>Can't Stay Down</h2>
    <p>Artist: Quincy Larson</p>
    <audio
        loop 
        controls
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/can't-stay-down.mp3" type="audio/mpeg">
    </audio>

    <h2>Cruising for a Musing</h2>
    <p>Artist: Quincy Larson</p>
    <audio
        loop
        controls
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/cruising-for-a-musing.mp3">
    </audio>

    <h2>Scratching the Surface</h2>
    <p>Artist: Quincy Larson</p>
    <audio
        loop
        controls
        src="https://cdn.freecodecamp.org/curriculum/js-music-player/scratching-the-surface.mp3">
    </audio>
</body>
</html>
